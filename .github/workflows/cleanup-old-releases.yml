name: Cleanup Old Releases

on:
  release:
    types: [published]
  workflow_dispatch: # allows manual trigger from the GitHub Actions UI

jobs:
  cleanup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Delete old releases (keep 10 most recent)
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_RELEASES = 10;

            // Fetch all releases sorted by creation date (newest first)
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            console.log(`Total releases found: ${releases.length}`);

            if (releases.length <= MAX_RELEASES) {
              console.log(`Only ${releases.length} release(s) exist. Nothing to delete.`);
              return;
            }

            // Releases are already sorted newest first; slice off the ones to delete
            const toDelete = releases.slice(MAX_RELEASES);
            console.log(`Deleting ${toDelete.length} old release(s)...`);

            for (const release of toDelete) {
              console.log(`Deleting release: ${release.tag_name} (id: ${release.id})`);

              // Delete the release
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              // Delete the associated git tag
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
                console.log(`Deleted tag: ${release.tag_name}`);
              } catch (err) {
                console.warn(`Could not delete tag ${release.tag_name}: ${err.message}`);
              }
            }

            console.log('Cleanup complete.');
