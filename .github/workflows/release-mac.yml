name: Release macOS Installer

# The Windows workflow (release-windows.yml) bumps the version, tags main,
# publishes the GitHub Release with the Windows installer, and then
# explicitly dispatches THIS workflow (passing the new tag) so the macOS
# DMGs (Apple Silicon + Intel) get built and attached to that same release.
#
# Why an explicit dispatch instead of just reacting to `release: published`?
# Releases/tags created via the API using the default GITHUB_TOKEN do NOT
# cascade into other workflows' event triggers — GitHub blocks this
# specifically to prevent infinite recursive workflow runs. `workflow_dispatch`
# is exempt from that restriction, which is why release-windows.yml calls
# `gh workflow run release-mac.yml -f tag_name=...` rather than relying on
# this workflow's `release: published` trigger to fire on its own.
#
# The `release: published` trigger is kept as a fallback for releases
# published manually by a human via the GitHub UI (a real user action isn't
# subject to the GITHUB_TOKEN cascade restriction). `workflow_dispatch` also
# doubles as a way to add a mac installer retroactively to any past release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing release tag to attach the macOS installers to (e.g. v1.5.82)'
        required: true
        type: string

# Guard against two runs building the SAME tag at the same time. This has
# actually happened in practice: the backfill safety-net workflow can fire
# from more than one trigger in quick succession (its own workflow_run and
# schedule triggers overlapping) and dispatch two builds for the same
# missing tag within a second of each other. Scoping the group by tag name
# means different tags still build fully in parallel (as before); only a
# genuine duplicate for the exact same tag gets queued behind the first
# instead of racing it (which risks two jobs uploading release assets for
# the same tag at once).
concurrency:
  group: release-mac-${{ github.event.inputs.tag_name || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-mac:
    # Only run for the version-tag releases produced by release-windows.yml
    if: ${{ github.event_name == 'workflow_dispatch' || (!github.event.release.prerelease && startsWith(github.event.release.tag_name, 'v')) }}
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          fetch-depth: 0

      - name: Verify checked-out commit can actually build the macOS target
        # Cheap sanity check that prints exactly what we're building before
        # spending minutes on a build that's doomed to fail with a confusing
        # error. If this ever fires, the log tells us immediately whether
        # the wrong ref was checked out or the script is genuinely missing,
        # instead of having to reason about it after the fact.
        run: |
          echo "Building ref: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          echo "Resolved commit: $(git rev-parse HEAD)"
          echo "package.json version: $(node -p "require('./package.json').version")"
          if ! node -e "process.exit(require('./package.json').scripts['electron:build:mac'] ? 0 : 1)"; then
            echo "::error::electron:build:mac script is missing from package.json at this commit -- cannot build"
            exit 1
          fi
          echo "electron:build:mac script found, proceeding"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installers (Apple Silicon + Intel)
        # Retries a couple of times before giving up. electron-builder does
        # real network I/O (downloading Electron/notarization tool binaries,
        # etc.) that can fail transiently, and we've also observed at least
        # one build fail for reasons that never recurred on a plain retry.
        # Automatically retrying here means a transient hiccup gets fixed
        # within THIS run, in minutes, rather than waiting on the backfill
        # workflow's next scheduled pass.
        run: |
          for attempt in 1 2 3; do
            echo "Build attempt $attempt/3..."
            if npm run electron:build:mac; then
              exit 0
            fi
            echo "::warning::Build attempt $attempt failed"
            sleep 10
          done
          echo "::error::All 3 build attempts failed"
          exit 1
        env:
          # There is no Developer ID certificate in this runner's keychain,
          # and there never will be one (no paid Apple Developer account).
          # Disabling auto-discovery keeps the build deterministic: it falls
          # straight to an ad-hoc signature, which is the minimum required
          # for the app to even launch on Apple Silicon.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS installers to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          files: |
            release/*.dmg
            release/_extras/*.dmg.blockmap
            release/_extras/*.zip
            release/_extras/*.zip.blockmap
            release/_extras/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
